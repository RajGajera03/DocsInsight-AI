version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pdf_qa_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: pdf_qa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: pdf_qa_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@postgres:5432/pdf_qa
      - SECRET_KEY=supersecretkey12345
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pdf_qa_frontend
    ports:
      - "8501:8501"
    environment:
      - BASE_URL=http://backend:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
